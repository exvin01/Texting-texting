<!DOCTYPE HTML>

<html>

<head>
  <title>CONTACT-HELP</title>
</head>
  <style>
    body{
         font-family: 'Open Sans', sans-serif;
         background-color: #e0e0e0 (rgb 224 224 224);
         margin-top: 50px;
         display: grid;
         font-size: 1.5em;

     }
       .header{
           display: flex;
           justify-content: space-between;

       }
       .searchbox{
           background-color: #eee;
           color: #333;
           font-size: 2.2em;
           border: 1px solid #000;
           padding-left: 40px;
           border-radius: 70px;
           width: 75%;
           margin-left: 30px;

       }
        .searchbox:hover{
           transform: scale(1.05);
        }
       img{
           cursor: pointer;
           border: none;
           border-radius: 70px 70px;
           width: 100px;
           height: auto;

       }
       button{
           background-color:#C6CC71;
           color: #fff;
           font-size: 2em;
           border: none;
           padding-left: 20px;
           padding-right: 20px;
           border-radius: 70px;
           cursor: pointer;
           justify-content: center;
           margin: auto;
           margin-top: 50px;
       }
        button:hover{
           transform: scale(1.1);
        }

       .icons{
           align-items: center;
           margin: auto;

       }
       .blocks{
           display: grid;
           grid-template-columns: 1fr 1fr;
            gap: 10px;
           height: auto;
           margin-left: 50px;
     }

     .blockitems{
         display: grid;
         background-color: #eee;
         border-radius: 10px;
         font-size: 1.2em;
         margin-top: 50px;
         margin-right: 50px;
         height: auto;
         padding-left: 20px;
         padding-top: 20px;
         padding-bottom: 30px;
         box-shadow: 0 4px 8px rgba(0,0,0,1);
    }
    code{
        text-align: center;
        margin-top: 30px;
        font-family: "Lucida Console", Monaco, monospace;
        font-weight: bold;
         color: #333;
    }
    .form{
        display: grid;
         background-color: #2f4f7f;
         border-radius: 10px;
         font-size: 2em;
         color: darkblue;
         font-weight: bold;
         margin: 50px;
         height: auto;
         justify-content: center;
         padding-top: 60px;
         padding-bottom: 70px;
         box-shadow: 0 4px 8px rgba(0,0,0,1);
         text-align: center;
         text-shadow: 0 0 5px darkblue;
    }
    input{
        background-color: #c0c0c0;
        padding: 10px;
        border: none;
        border-radius: 2px;
        margin-bottom: 40px;
        font-size: 1.2em;
        box-shadow: 0 4px 8px rgba(0,0,0,1);
    }
    input:hover{
      transform: scale(1.1);
    }
    textarea{
        background-color: #c0c0c0;
        padding: 10px;
        border: none;
        border-radius: 2px;
        margin-bottom: 10px;
        font-size: 1.1em;
        box-shadow: 0 4px 8px rgba(0,0,0,1);
    }
     textarea:hover{
      transform: scale(1.02);
    }
    .submit{
        background-color: #2f4f7f;
        font-family: courier new;
        font-weight: bold;
        color: darkblue;
        border: 2px solid #2f4f7f;
        border-radius: 1px;
        box-shadow: 0 4px 8px rgba(0,0,0,1);
      text-shadow: 0 0 5px darkblue;

    }


  </style>
<body>     <!--default header!-->
         <div class='header'>
         <input  class='searchbox' type="textbox" name='searchbox'
         placeholder='Search the music or artist' />
         <img src="logo.jpg" width="100" height="100"  style="margin-right: 20px;"alt="mup log">
        
     </div>

     <div class='header'>
         <button id='shorts'>Shorts</button>
         <button id='all' >All</button>
         <button id='videos'>Video</button>
         <button id='audios'>Audio</button>


     </div>

        <!--container block!-->
        <div class='blocks'>
                  <div class='blockitems'>
                   <img class='icons' src="location icon.jpg"  alt="location logo">
                   <code>OUR MAIN OFFICE</code>
                   <code>Zomba Malawi</code>
                   <code>box 002, Domasi</code>
                   </div>


                   <div class='blockitems'>
                   <img class='icons' src="phone call icon.png"  alt="location logo">
                   <code>PHONE NUMBER</code>
                   <code>+265-985-091-034 </code>
                   <code>+265-985-091-034</code>
                  </div>

        </div>
            <!--container block02!-->
        <div class='blocks'>
               <div class='blockitems'>
                   <img class='icons' src="facebook icon.png"  alt="location logo">
                   <code>FACEBOOK PAGE</code>
                   <code>MUP</code>
                   <code>music promotion</code>
               </div>

               <div class='blockitems'>
                   <img class='icons' src="email icon.png"  alt="location logo">
                   <code>EMAIL</code>
                   <code>mup@gmail.com</code>
                   <code></code>
               </div>


        </div>

     <!--submit/form!-->
     <form action="" method='POST'>
              <div class="form">
                  <p>Contact Us</p>
                  <input  type='textbox' name="name" required  placeholder="Enter Your Name">
                  <input name="email" type="email" required placeholder="Enter a valid email">
                  <textarea name="discription" rows="10" cols="10"
                  required placeholder="Explain Your ideas or any querry"></textarea>
                  <button class="submit">SUBMIT</button>
              </div>

     </form>

      <script>
         const all = document.getElementById('all');
         
       all.addEventListener('click', function(event){
           window.location.href ='index.html';
       });
      </script>

</body>

</html>
