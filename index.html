       .header{

           padding-left: 40px;
           border-radius: 70px;
           width: 75%;

        .searchbox:hover{
           transform: scale(1.05);
        }
       img{

           border-radius: 70px 70px;
           margin-right: 30px;
       }
       button{

           border-radius: 70px;

           justify-content: center;
           margin: auto;

       }

           transform: scale(1.1);
        }
       .download-button{
           font-size: 2em;
           padding: 10px;
           background-color: #333;
           margin-top: 2px;
           margin-left: 100px;
           animation: blink 2s infinite;
           margin-bottom: 50px;
       }
    @keyframes blink{
       0% {opacity: 1;}
       50% {opacity: 0;}
       100% {opacity: 1;}
      }
      .maindownload{
           color: #fff;
           padding: 20px;
}
       .videos{
           background-color: #fff;
           padding: 20PX;
           text-align: center;
           padding-top: 50px;
           border-radius: 10PX;

       }
       .layout{
           display: grid;
           grid-template-rows: 1fr;
           gap: 30px;
           justify-content: center;
           margin-top: 50px;
           margin-right: 50px;
           margin-left: 50px;
       }
       video{
           border-radius: 25px;

       }

       code{
           color: #666;
           margin-left: 100px;
           font-size: 2em;
       }
       .footer{
           display: grid;
           grid-template-columns: 1fr 1fr 1fr;
           gap: 50px;
           justify-content: center;
           margin: auto;
           position: fixed;
           bottom: 0;
           background-color: #eee;
           border-radius: 20px;
           padding: 30px;
           transform: translateY(100%);
           transition: transform 0.3s ease-in-out;
       }
       .footer.show{
             transform: translateY(0);
       }
       .fbutton{
          background-color: #333;
          padding: 20px;
          border: none;
          border-radius: 5px;
          font-size: 1.7em;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 1);

       }

    <script>


       window.addEventListener('scroll', () =>{
         const footer = document.getElementById('footer');
         const scrollposition = window.scrollY;
           if (scrollposition > 100) {
               footer.classList.add('show');
           } else {
               footer.classList.remove('show');
           }
       });


       const contact = document.getElementById('contact');

       });
